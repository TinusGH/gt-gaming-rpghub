<div class="min-h-screen flex flex-col items-center justify-center text-center px-6
            bg-background-dark text-textPrimary-dark">

  <!-- Large 404 -->
  <h1 class="text-[8rem] font-header font-black leading-none text-primary opacity-80 select-none">
    404
  </h1>

  <h2 class="text-2xl font-header font-bold mt-2 mb-3 text-textPrimary-dark">
    Page Not Found
  </h2>
  <p class="text-textSecondary-dark max-w-sm mb-8">
    Looks like you wandered off the map. This page doesn't exist.
  </p>

  <button (click)="goHome()"
          class="px-6 py-3 rounded font-semibold text-sm text-white
                 bg-primary hover:bg-primary-hover
                 transition-colors duration-200">
    Back to Hub
  </button>
</div>
