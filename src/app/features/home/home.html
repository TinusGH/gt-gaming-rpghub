<!-- Responsive Grid of Cards -->
<div class="grid gap-6 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 p-6">
  <div *ngFor="let game of games" class="p-4 rounded-lg shadow-lg flex flex-col justify-between
              bg-gray-300 dark:bg-red-500
              text-black dark:text-white">
    <div>
      <h2 class="text-xl font-header mb-2">{{ game.title }}</h2>
      <p class="text-textSecondary dark:text-white">{{ game.genre }}</p>
      <p class="mt-2 font-bold">{{ game.hours }} Hours Played</p>
    </div>

    <!-- Navigate to GameDetail page -->
    <button (click)="goToGame(game.id)" class="mt-4 px-4 py-2 rounded
         bg-gray-800 text-white
         hover:opacity-80 transition-colors duration-200">
      View Details
    </button>
  </div>
</div>

<!-- Subscribe Modal -->
<div *ngIf="modalOpen()" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50">

  <div class="bg-white dark:bg-background p-6 rounded-lg w-80 text-center shadow-lg">
    <h3 class="text-lg font-header mb-4 text-black dark:text-white">
      Subscribe to {{ selectedGame() }}?
    </h3>

    <div class="flex justify-around">
      <button (click)="closeModal()"
        class="px-4 py-2 rounded bg-gray-300 dark:bg-gray-700 dark:text-white hover:opacity-80 transition">
        Cancel
      </button>

      <button (click)="confirmSubscribe()" class="px-4 py-2 rounded bg-red-500 text-white hover:opacity-80 transition">
        Confirm
      </button>
    </div>
  </div>
</div>
