<!-- [CL-4.3] Accessibility: <section> is a semantic landmark, more meaningful than a plain <div> -->
<!-- Hero Section -->
<section class="relative px-6 py-16 text-center overflow-hidden
                bg-background-nav dark:bg-background-nav-dark
                border-b-2 border-primary">

  <div class="absolute inset-0 bg-gradient-to-br from-primary to-transparent
              opacity-5 dark:opacity-10 pointer-events-none"></div>

  <div class="relative z-10">
    <!-- [CL-11.2] SEO: One h1 per page — the primary page heading -->
    <!-- [CL-1.2] Responsiveness: font scales up at wider breakpoints to prevent overflow on mobile -->
    <h1 class="text-4xl sm:text-5xl md:text-6xl font-tarrget italic mb-3
               text-textPrimary dark:text-textPrimary-dark">
      GT_Gaming Hub
    </h1>
    <p class="text-lg max-w-xl mx-auto mb-8
              text-textSecondary dark:text-textSecondary-dark">
      RPG streamer. Full Let's Plays &amp; Chill Sessions across all platforms.
    </p>

    <!-- Platform Links -->
    <!-- [CL-10.1] Security: rel="noopener noreferrer" prevents the opened tab from
         accessing window.opener, closing a tab-napping attack vector -->
    <div class="flex justify-center flex-wrap gap-3">
      <a href="https://www.youtube.com/@gt_gaming_youtube" target="_blank" rel="noopener noreferrer"
         class="px-4 py-2 rounded font-semibold text-sm text-white
                bg-red-600 hover:bg-red-700 transition-colors duration-200">
        YouTube
      </a>
      <a href="https://www.twitch.tv/gt_gaming_twitch" target="_blank" rel="noopener noreferrer"
         class="px-4 py-2 rounded font-semibold text-sm text-white
                bg-purple-600 hover:bg-purple-700 transition-colors duration-200">
        Twitch
      </a>
      <a href="https://kick.com/gt-gaming-kick" target="_blank" rel="noopener noreferrer"
         class="px-4 py-2 rounded font-semibold text-sm text-white
                bg-green-600 hover:bg-green-700 transition-colors duration-200">
        Kick
      </a>
      <a href="https://rumble.com/user/GT_Gaming_Rumble" target="_blank" rel="noopener noreferrer"
         class="px-4 py-2 rounded font-semibold text-sm text-white
                bg-orange-500 hover:bg-orange-600 transition-colors duration-200">
        Rumble
      </a>
    </div>
  </div>
</section>

<!-- [CL-4.3] Accessibility: <section> with a heading gives screen readers a navigable landmark -->
<section class="p-6">

  <!-- Toolbar: Title + Search + Filters -->
  <!-- [CL-1.2] Layout: flex-col on mobile stacks controls vertically;
       sm:flex-row switches to a single row on wider screens -->
  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">

    <!-- [CL-11.2] SEO: h2 follows the h1 above — correct heading hierarchy -->
    <h2 class="text-2xl font-header font-bold text-textPrimary dark:text-textPrimary-dark">
      Game Library
    </h2>

    <div class="flex flex-col sm:flex-row gap-3 sm:items-center">

      <!-- [CL-4.1] Accessibility: Native <input> is keyboard focusable by default -->
      <!-- [CL-4.2] Accessibility: focus:border-primary provides a visible focus indicator -->
      <input type="text"
             placeholder="Search games..."
             aria-label="Search games"
             (input)="onSearch($event)"
             class="px-3 py-1.5 rounded text-sm border outline-none
                    bg-background-card dark:bg-surface
                    border-transparent focus:border-primary
                    text-textPrimary dark:text-textPrimary-dark
                    placeholder:text-text-muted
                    transition-colors duration-200">

      <!-- Filter Buttons -->
      <!-- [CL-4.1] Accessibility: <button> elements are keyboard-focusable and
           announce their role to screen readers automatically -->
      <div class="flex gap-2" role="group" aria-label="Filter by stream type">
        <button (click)="setFilter('all')"
                [ngClass]="filterType() === 'all'
                  ? 'bg-primary text-white'
                  : 'bg-surface text-textSecondary-dark hover:border-primary border border-transparent'"
                class="px-3 py-1.5 rounded text-xs font-semibold transition-colors duration-200">
          All
        </button>
        <button (click)="setFilter('lets-play')"
                [ngClass]="filterType() === 'lets-play'
                  ? 'bg-primary text-white'
                  : 'bg-surface text-textSecondary-dark hover:border-primary border border-transparent'"
                class="px-3 py-1.5 rounded text-xs font-semibold transition-colors duration-200">
          Let's Play
        </button>
        <button (click)="setFilter('chill')"
                [ngClass]="filterType() === 'chill'
                  ? 'bg-primary text-white'
                  : 'bg-surface text-textSecondary-dark hover:border-primary border border-transparent'"
                class="px-3 py-1.5 rounded text-xs font-semibold transition-colors duration-200">
          Chill
        </button>
      </div>

    </div>
  </div>

  <!-- [CL-6.1] Dynamic Content: explicit empty state prevents a confusing blank grid -->
  <div *ngIf="filteredGames().length === 0"
       class="text-center py-16 text-textSecondary dark:text-textSecondary-dark">
    No games match your search.
  </div>

  <!-- [CL-1.2] Layout: mobile-first single column, expands to 2 → 3 → 4 columns -->
  <div class="grid gap-6 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4">

    <!-- [CL-7.4] Performance: trackBy prevents Angular destroying/recreating DOM nodes
         when the filtered list updates — only changed items are re-rendered -->
    <div *ngFor="let game of filteredGames(); trackBy: trackById"
         class="rounded-lg shadow-lg flex flex-col overflow-hidden
                bg-background-card dark:bg-background-card-dark
                border border-transparent hover:border-primary
                transition-all duration-200">

      <!-- Cover Image -->
      <!-- [CL-5.4] Images: fallback text shown when cover image fails to load -->
      <div class="h-44 bg-surface flex items-center justify-center overflow-hidden relative">
        <span class="text-text-muted text-sm font-body">No Cover</span>
        <!-- [CL-5.3] Images: [alt] uses the game title — meaningful for screen readers -->
        <img [src]="game.cover" [alt]="game.title"
             class="absolute inset-0 w-full h-full object-cover"
             (error)="onCoverError($event)">
      </div>

      <!-- Card Body -->
      <div class="p-4 flex flex-col flex-1 justify-between">
        <div>
          <span class="inline-block text-xs font-semibold px-2 py-0.5 rounded mb-2"
                [ngClass]="game.streamType === 'lets-play'
                  ? 'bg-primary text-white'
                  : 'bg-blue-600 text-white'">
            {{ game.streamType === 'lets-play' ? "Let's Play" : 'Chill Stream' }}
          </span>

          <!-- [CL-6.3] Dynamic Content: truncate prevents long titles (e.g. "Final Fantasy VII
               Remake Intergrade") from breaking the card layout on narrow viewports -->
          <h2 class="text-lg font-header font-bold mb-1 truncate
                     text-textPrimary dark:text-textPrimary-dark"
              [title]="game.title">
            {{ game.title }}
          </h2>
          <p class="text-sm text-textSecondary dark:text-textSecondary-dark">
            {{ game.genre }}
          </p>
          <p class="text-sm font-semibold mt-1 text-textPrimary dark:text-textPrimary-dark">
            {{ game.hours }} hrs played
          </p>
        </div>

        <!-- [CL-1.5] Layout: py-2 px-4 ensures the button meets the 44px minimum touch target -->
        <button (click)="goToGame(game.id)"
                class="mt-4 px-4 py-2 rounded text-sm font-semibold text-white
                       bg-primary hover:bg-primary-hover
                       transition-colors duration-200">
          View Details
        </button>
      </div>

    </div>
  </div>

</section>
