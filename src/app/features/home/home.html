<!-- Responsive Grid of Cards -->
<div class="grid gap-6 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 p-6">
  <div *ngFor="let game of games"
       class="p-4 bg-primary text-white dark:bg-black dark:text-white rounded-lg shadow-lg flex flex-col justify-between">
    <div>
      <h2 class="text-xl font-header mb-2">{{ game.title }}</h2>
      <p class="text-textSecondary">{{ game.genre }}</p>
      <p class="mt-2 font-bold">{{ game.hours }} Hours Played</p>
    </div>
    <button
      (click)="openSubscribeModal(game.title)"
      class="mt-4 px-4 py-2 bg-white text-primary font-bold rounded hover:bg-gray-200 transition-colors duration-200">
      Subscribe
    </button>
  </div>
</div>

<!-- Subscribe Modal -->
<div
  *ngIf="modalOpen()"
  class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50">

  <div class="bg-white dark:bg-background p-6 rounded-lg w-80 text-center shadow-lg">
    <!-- Apply text color for light and dark -->
    <h3 class="text-lg font-header mb-4 text-black dark:text-white">
      Subscribe to {{ selectedGame() }}?
    </h3>

    <div class="flex justify-around">
      <button
        (click)="closeModal()"
        class="px-4 py-2 rounded bg-gray-300 dark:bg-gray-700 dark:text-white hover:opacity-80 transition">
        Cancel
      </button>

      <button
        (click)="confirmSubscribe()"
        class="px-4 py-2 rounded bg-primary text-white hover:opacity-80 transition">
        Confirm
      </button>
    </div>
  </div>
</div>
