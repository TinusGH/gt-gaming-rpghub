<div *ngIf="game() as g" class="grid gap-6 lg:grid-cols-12 p-6 items-stretch">

  <!-- Left Column: Cover Image Card -->
  <div class="lg:col-span-3">
    <div class="bg-gray-300 dark:bg-red-500 rounded-lg p-2 flex items-center justify-center h-full">
      <img [src]="g.cover" alt="{{ g.title }}" class="rounded-lg shadow-md w-full h-full object-contain">
    </div>
  </div>

  <!-- Right Panels -->
  <div class="lg:col-span-9 grid gap-6 lg:grid-cols-3">

    <!-- Game Info -->
    <div class="bg-gray-300 dark:bg-red-500 text-black dark:text-white rounded-lg p-4">
      <h2 class="text-2xl font-bold font-header mb-2">{{ g.title }}</h2>
      <p class="text-textSecondary dark:text-white mb-1">{{ g.genre }}</p>
      <p class="font-semibold">{{ g.hours }} Hours Played</p>
    </div>

    <!-- Voting Panel -->
    <div class="bg-gray-300 dark:bg-red-500 text-black dark:text-white rounded-lg p-4">
      <h3 class="text-xl font-bold font-header mb-2">Vote Now</h3>
      <div class="flex items-center space-x-4">
        <button (click)="upvote()"
          class="px-4 py-2 bg-green-500 dark:bg-green-600 text-white rounded hover:opacity-80 transition">
          Upvote ({{ g.votes.up }})
        </button>

        <button (click)="downvote()"
          class="px-4 py-2 bg-red-500 dark:bg-red-600 text-white rounded hover:opacity-80 transition">
          Downvote ({{ g.votes.down }})
        </button>
      </div>
    </div>

    <!-- Stream Sessions -->
    <div class="bg-gray-300 dark:bg-red-500 text-black dark:text-white rounded-lg p-4">
      <h3 class="text-xl font-bold font-header mb-2">Stream Sessions</h3>
      <ul>
        <li *ngFor="let s of g.sessions" class="mb-2 flex justify-between items-center">
          <span>{{ s.title }} ({{ s.platform }})</span>
          <div class="flex gap-2">
            <!-- Watch VOD Button -->
            <a [href]="s.vodUrl" target="_blank"
              class="px-3 py-1 rounded bg-blue-500 dark:bg-blue-600 text-white hover:opacity-80 transition">
              Watch VOD
            </a>
            <!-- Subscribe Button -->
            <button (click)="openSubscribeModal(s)"
              class="px-3 py-1 rounded bg-red-500 dark:bg-red-600 text-white hover:opacity-80 transition">
              Subscribe
            </button>
          </div>
        </li>
      </ul>
    </div>

  </div>
</div>
